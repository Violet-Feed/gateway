<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <title>下载 Violet App</title>

    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="shortcut icon" type="image/png" href="./logo.png" />
    <link rel="apple-touch-icon" href="./logo.png" />

    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family:
                    -apple-system,
                    BlinkMacSystemFont,
                    "PingFang SC",
                    "HarmonyOS Sans SC",
                    "Microsoft YaHei",
                    "Helvetica Neue",
                    Arial,
                    sans-serif;
            font-weight: 400;
            color: #1f2329;
            background: #fffaf4;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
        }

        a,
        button {
            font-family: inherit;
            font-weight: 400;
            -webkit-tap-highlight-color: transparent;
        }

        .page {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding:
                    calc(34px + env(safe-area-inset-top))
                    34px
                    calc(26px + env(safe-area-inset-bottom));
            overflow: hidden;
            background:
                    radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0.68) 32%, rgba(253, 231, 209, 0.32) 58%, rgba(255, 255, 255, 0.08) 100%),
                    linear-gradient(160deg, rgba(253, 231, 209, 0.92) 0%, #fff7ee 36%, #ffffff 66%, #fffaf5 100%);
        }

        .bg-layer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-circle {
            position: absolute;
            border-radius: 999px;
            background: rgba(253, 231, 209, 0.76);
        }

        .bg-circle-top {
            left: 19%;
            top: -78px;
            width: clamp(132px, 33vw, 192px);
            height: clamp(132px, 33vw, 192px);
            background: rgba(253, 231, 209, 0.58);
        }

        .bg-circle-right {
            right: 14%;
            top: 22%;
            width: clamp(54px, 13vw, 78px);
            height: clamp(54px, 13vw, 78px);
            background: rgba(253, 231, 209, 0.82);
        }

        .bg-circle-left {
            left: -124px;
            top: 43%;
            width: clamp(210px, 52vw, 300px);
            height: clamp(210px, 52vw, 300px);
            background: rgba(253, 231, 209, 0.72);
        }

        .brush {
            position: absolute;
            left: 22%;
            right: 16%;
            top: 34%;
            height: 42px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.5);
            filter: blur(1px);
            transform: rotate(-1deg);
        }

        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 430px;
            min-height: calc(100vh - 60px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: clamp(118px, 22vh, 190px);
            text-align: center;
        }

        .brand-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .brand-img {
            display: block;
            width: clamp(210px, 58vw, 315px);
            height: auto;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            filter:
                    drop-shadow(0 2px 2px rgba(255, 255, 255, 0.62))
                    drop-shadow(0 8px 20px rgba(31, 35, 41, 0.08));
        }

        .slogan-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: clamp(8px, 2.6vw, 13px);
            margin-top: clamp(28px, 7vw, 42px);
        }

        .slogan-text {
            margin: 0;
            color: #5f6368;
            font-size: clamp(15px, 4vw, 18px);
            line-height: 1.45;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .slogan-mark {
            color: #f5a623;
            font-size: clamp(25px, 7vw, 34px);
            line-height: 1;
            font-weight: 700;
        }

        .download-area {
            width: 100%;
            margin-top: clamp(28px, 4.8vh, 46px);
            padding-top: 0;
            padding-bottom: 4px;
        }

        .app-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            min-height: 66px;
            padding: 11px 14px;
            margin-bottom: 12px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow:
                    0 18px 42px rgba(138, 90, 43, 0.18),
                    0 6px 16px rgba(138, 90, 43, 0.08),
                    inset 0 1px 0 rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
        }

        .logo {
            width: 46px;
            height: 46px;
            border-radius: 15px;
            object-fit: cover;
            background: #f4f4f4;
            box-shadow: 0 8px 18px rgba(31, 35, 41, 0.12);
            flex-shrink: 0;
        }

        .app-info {
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .app-name {
            color: #202124;
            font-size: 16px;
            line-height: 1.25;
            font-weight: 400;
        }

        .app-desc {
            margin-top: 4px;
            color: #7a7f87;
            font-size: 12px;
            line-height: 1.3;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 56px;
            border-radius: 21px;
            color: #202124;
            text-decoration: none;
            font-size: 17px;
            line-height: 1;
            font-weight: 400;
            letter-spacing: 1px;
            background: rgba(253, 231, 209, 1);
            box-shadow:
                    0 18px 38px rgba(138, 90, 43, 0.22),
                    0 6px 16px rgba(138, 90, 43, 0.1)
        }

        .download:active {
            transform: scale(0.988);
            opacity: 0.9;
        }

        .tip {
            margin: 11px 4px 0;
            color: #8e8379;
            font-size: 12px;
            line-height: 1.7;
            text-align: center;
            font-weight: 400;
        }

        @media (max-height: 720px) {
            .page {
                padding-left: 30px;
                padding-right: 30px;
            }

            .hero {
                padding-top: clamp(84px, 17vh, 130px);
            }

            .download-area {
                margin-top: clamp(22px, 4vh, 34px);
            }

            .brand-img {
                width: clamp(190px, 54vw, 275px);
            }

            .slogan-row {
                margin-top: clamp(23px, 6vw, 34px);
            }
        }

        @media (max-width: 360px) {
            .page {
                padding-left: 24px;
                padding-right: 24px;
            }

            .slogan-row {
                gap: 7px;
            }

            .slogan-text {
                font-size: 14px;
            }

            .download {
                height: 54px;
                border-radius: 20px;
            }
        }

        @media (prefers-color-scheme: dark) {
            html,
            body {
                color: #1f2329;
                background: #fffaf4;
            }

            .page {
                background:
                        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0.68) 32%, rgba(253, 231, 209, 0.32) 58%, rgba(255, 255, 255, 0.08) 100%),
                        linear-gradient(160deg, rgba(253, 231, 209, 0.92) 0%, #fff7ee 36%, #ffffff 66%, #fffaf5 100%);
            }

            .app-chip {
                background: rgba(255, 255, 255, 0.92);
            }

            .app-name,
            .download {
                color: #202124;
            }

            .slogan-text {
                color: #5f6368;
            }

            .app-desc {
                color: #7a7f87;
            }

            .tip {
                color: #8e8379;
            }
        }
    </style>
</head>

<body>
<main class="page">
    <div class="bg-layer">
        <div class="bg-circle bg-circle-top"></div>
        <div class="bg-circle bg-circle-right"></div>
        <div class="bg-circle bg-circle-left"></div>
        <div class="brush"></div>
    </div>

    <section class="content">
        <div class="hero" aria-label="Violet">
            <div class="brand-wrap">
                <img class="brand-img" src="./violet.png" alt="Violet" />
            </div>

            <div class="slogan-row">
                <span class="slogan-mark">≺</span>
                <p class="slogan-text">让每一次灵感，都有机会变成一次互动</p>
                <span class="slogan-mark">≻</span>
            </div>
        </div>

        <section class="download-area" aria-label="下载 Violet 应用">
            <div class="app-chip">
                <img class="logo" src="logo.png" alt="Violet Logo" />
                <div class="app-info">
                    <div class="app-name">Violet App</div>
                    <div class="app-desc">AI 创作、兴趣发现与智能互动</div>
                </div>
            </div>

            <a
                    class="download"
                    href="https://violet-feed.oss-cn-beijing.aliyuncs.com/apk/Violet-latest.apk"
            >
                下载 Android 版
            </a>

            <p class="tip">
                当前为 Android 安装包。若浏览器提示风险，请选择继续下载，并在系统设置中允许安装。
            </p>
        </section>
    </section>
</main>
</body>
</html>
