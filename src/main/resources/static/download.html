<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>下载 Violet App</title>
    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="shortcut icon" type="image/png" href="./logo.png" />
    <link rel="apple-touch-icon" href="./logo.png" />
    <style>
        :root {
            --bg: #0f1025;
            --card: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.72);
            --primary: #8b5cf6;
            --primary-2: #ec4899;
            --line: rgba(255, 255, 255, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                    radial-gradient(circle at 20% 15%, rgba(236, 72, 153, 0.35), transparent 28%),
                    radial-gradient(circle at 85% 20%, rgba(139, 92, 246, 0.42), transparent 30%),
                    linear-gradient(180deg, #17172f 0%, var(--bg) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 18px;
        }

        .page {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 22px;
            padding: 8px 14px 8px 8px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .logo {
            display: block;
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
            flex: 0 0 auto;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .brand-subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1;
            text-align: left;
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 9vw, 44px);
            line-height: 1.12;
            letter-spacing: -0.04em;
        }

        .desc {
            margin: 18px auto 0;
            max-width: 330px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.75;
        }

        .card {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.26);
            backdrop-filter: blur(18px);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .feature {
            padding: 13px 8px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.86);
        }

        .feature span {
            display: block;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .download {
            display: block;
            width: 100%;
            padding: 16px 18px;
            border-radius: 18px;
            color: #fff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            box-shadow: 0 16px 30px rgba(236, 72, 153, 0.28);
        }

        .tip {
            margin: 14px 0 0;
            color: rgba(255, 255, 255, 0.58);
            font-size: 12px;
            line-height: 1.6;
        }

        footer {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
        }
    </style>
</head>
<body>
<main class="page">
    <div class="brand" aria-label="Violet App">
        <img class="logo" src="logo.png" alt="Violet Logo" />
        <div>
            <div class="brand-name">Violet App</div>
            <div class="brand-subtitle">AI 社交内容应用</div>
        </div>
    </div>

    <h1>下载 Violet<br />开启你的灵感社交</h1>

    <p class="desc">
        在 Violet，你可以用 AI 创作内容、发现感兴趣的作品，也可以和懂分寸的 AI 群聊伙伴自然互动。
    </p>

    <section class="card" aria-label="下载 Violet 应用">
        <div class="features">
            <div class="feature"><span>🎨</span>AI 创作</div>
            <div class="feature"><span>💫</span>兴趣推荐</div>
            <div class="feature"><span>💬</span>智能群聊</div>
        </div>

        <a class="download" href="https://github.com/Violet-Feed/starter/releases/latest/download/violet.apk">
            下载 Android 版
        </a>

        <p class="tip">
            当前为 Android 安装包。若浏览器提示风险，请选择继续下载并在系统设置中允许安装。
        </p>
    </section>

    <footer>© 2026 Violet. Create, discover, chat.</footer>
</main>
</body>
</html>
